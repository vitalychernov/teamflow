# Render Blueprint — defines all infrastructure as code.
# Render reads this file and creates the database + web service automatically.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: teamflow-db
    databaseName: teamflow
    user: teamflow
    plan: free

services:
  - type: web
    name: teamflow-backend
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend

    branch: main
    autoDeploy: true

    healthCheckPath: /actuator/health

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # Render's connectionString is in postgres:// format — not compatible with JDBC.
      # Solution: pass individual DB properties and build the JDBC URL in application-prod.yml.
      - key: DB_HOST
        fromDatabase:
          name: teamflow-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: teamflow-db
          property: port

      - key: DB_NAME
        fromDatabase:
          name: teamflow-db
          property: database

      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: teamflow-db
          property: user

      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: teamflow-db
          property: password

      # Set manually in Render dashboard → Environment after first deploy
      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRATION
        value: "86400000"
