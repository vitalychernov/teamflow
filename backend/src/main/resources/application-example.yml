spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/teamflow_dev
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD

app:
  jwt:
    secret: your-local-secret-key-min-32-characters-long
    expiration: 86400000
