# ==========================================
# PROD profile — Render.com deployment.
# NO secrets here — all sensitive values come
# from environment variables set in Render dashboard.
# This file IS committed to git.
# ==========================================

spring:
  datasource:
    # Render's connectionString is postgres:// — not valid for JDBC.
    # We receive DB_HOST, DB_PORT, DB_NAME separately and build the JDBC URL here.
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    # Connection pool settings for Render free tier
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    # validate: checks schema matches entities, does NOT modify DB.
    # Use Flyway/Liquibase for migrations in real enterprise apps.
    # For this project: 'update' on first deploy, then 'validate'.
    hibernate:
      ddl-auto: update
    show-sql: false

# Minimal logging in production
logging:
  level:
    com.teamflow: INFO
    org.springframework.security: WARN
    root: WARN
