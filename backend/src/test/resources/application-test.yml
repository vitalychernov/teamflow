# ==========================================
# TEST profile — used during 'mvn test'.
# H2 in-memory DB: no PostgreSQL needed in CI.
# ==========================================

spring:
  datasource:
    url: jdbc:h2:mem:teamflow_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

app:
  jwt:
    secret: test-secret-key-for-unit-tests-only-32chars
    expiration: 3600000
