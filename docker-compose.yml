version: '3.8'

services:

  # ==========================================
  # PostgreSQL — local development database.
  # Data is persisted in a Docker volume,
  # so it survives container restarts.
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: teamflow-postgres
    environment:
      POSTGRES_DB: teamflow_dev
      POSTGRES_USER: teamflow
      POSTGRES_PASSWORD: teamflow
    ports:
      # host:container — access from localhost:5432
      - "5432:5432"
    volumes:
      # Named volume: data persists between 'docker-compose down' runs
      # Use 'docker-compose down -v' to also delete data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamflow -d teamflow_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Backend — Spring Boot app (built from source).
  # Starts only after postgres is healthy.
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamflow-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/teamflow_dev
      SPRING_DATASOURCE_USERNAME: teamflow
      SPRING_DATASOURCE_PASSWORD: teamflow
      JWT_SECRET: local-dev-secret-change-in-production-must-be-long-enough
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
