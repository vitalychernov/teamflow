version: '3.8'

services:

  # ==========================================
  # PostgreSQL — local development database.
  # Data is persisted in a Docker volume,
  # so it survives container restarts.
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: teamflow-postgres
    environment:
      POSTGRES_DB: teamflow_dev
      POSTGRES_USER: teamflow
      POSTGRES_PASSWORD: teamflow
    ports:
      # host:container — access from localhost:5432
      - "5432:5432"
    volumes:
      # Named volume: data persists between 'docker-compose down' runs
      # Use 'docker-compose down -v' to also delete data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamflow -d teamflow_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
